name: safety_lens
description: "Safety Lens — AI-Powered Industrial Safety by SAIL"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:        # ← moved here, same level as flutter
    sdk: flutter
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  fl_chart: ^0.66.0
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  image_picker: ^1.0.7
  speech_to_text: ^6.6.0
  permission_handler: ^11.3.0
  share_plus: ^9.0.0
  path_provider: ^2.1.2
  http: ^1.2.0
  # PDF export
  pdf: ^3.10.7
  printing: ^5.12.0
  # File picker for knowledge base PDF/Word uploads
  file_picker: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  generate: true              # ← indented 2 spaces under flutter:
  uses-material-design: true
  assets:
    - assets/images/
