name: safety_lens
description: "Safety Lens — AI-Powered Industrial Safety by SAIL"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # Charts
  fl_chart: ^0.66.0

  # Storage & Prefs
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2

  # Localisation
  intl: ^0.18.1

  # Media & Input
  image_picker: ^1.0.7
  speech_to_text: ^6.6.0
  permission_handler: ^11.3.0
  file_picker: ^6.1.1
  geolocator: ^10.1.0
  geocoding: ^2.1.1
  image: ^4.1.3

  # Sharing & Networking
  share_plus: ^9.0.0
  http: ^1.2.0

  # Network Detection (NEW)
  connectivity_plus: ^5.0.0

  # PDF export
  pdf: ^3.10.7
  printing: ^5.12.0

  # ── Admin Panel — open in browser ──
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

  assets:
    - assets/images/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
    image_path: "assets/images/app_icon.png"
    background_color: "#0A0E1A"
    theme_color: "#2196F3"
  image_path: "assets/images/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/app_icon_foreground.png"
  min_sdk_android: 21
