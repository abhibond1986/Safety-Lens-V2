name: Build and Deploy Safety Lens Web

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

# ★ Prevent concurrent deployments — cancel older runs if a new push arrives
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
          cache: true

      - name: Flutter version (sanity check)
        run: flutter --version

      - name: Enable web platform
        run: flutter config --enable-web

      - name: Flutter pub get
        run: flutter pub get

      - name: Build web (release)
        run: flutter build web --release --base-href "/Safety-Lens-V2/" --no-tree-shake-icons

      - name: List web output
        run: ls -la build/web/

      - name: Copy app icon as favicon and web root icon
        run: |
          cp assets/images/app_icon.png build/web/app_icon.png
          cp assets/images/app_icon.png build/web/favicon.png

      - name: Add SPA fallback for routing
        run: cp build/web/index.html build/web/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
