<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Safety Lens - AI-powered industrial safety for SAIL">

  <!-- iOS meta tags & icons -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Safety Lens">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- PWA tags -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#0D47A1">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">

  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Safety Lens · SAIL</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #0A0E1A;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }
    #loading {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0A0E1A;
      color: #fff;
      z-index: 9999;
    }
    #loading img {
      width: 90px;
      height: 90px;
      background: white;
      border-radius: 18px;
      padding: 8px;
      margin-bottom: 20px;
    }
    #loading h1 {
      font-family: Georgia, serif;
      font-size: 28px;
      margin: 0;
      background: linear-gradient(135deg, #2196F3, #00BCD4);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    #loading h1 span {
      font-style: italic;
      background: linear-gradient(135deg, #F59E0B, #EF4444);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    #loading p {
      color: #64748B;
      font-size: 11px;
      letter-spacing: 1.5px;
      margin-top: 8px;
    }
    #loading .spinner {
      margin-top: 30px;
      width: 32px;
      height: 32px;
      border: 3px solid #1C2540;
      border-top-color: #2196F3;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="loading">
    <img src="icons/Icon-192.png" alt="SAIL Logo">
    <h1>Safety<span> Lens</span></h1>
    <p>SAIL · IS 14489</p>
    <div class="spinner"></div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('load', function(ev) {
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: null
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp().then(function() {
              var loading = document.getElementById('loading');
              if (loading) {
                loading.style.opacity = '0';
                loading.style.transition = 'opacity 0.4s';
                setTimeout(function() { loading.remove(); }, 400);
              }
            });
          });
        }
      });
    });
  </script>
</body>
</html>
